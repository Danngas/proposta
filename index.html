<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposta Comercial — Enner Engenharia</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===================== PÁGINA 1 — CAPA (ilustração vetorial) ===================== -->
<section class="page cover" id="capa">
<svg id="capa-svg" width="595" height="842" viewBox="0 0 595 842" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2a52"/>
      <stop offset="35%" stop-color="#3d4a7a"/>
      <stop offset="55%" stop-color="#e08a3e"/>
      <stop offset="75%" stop-color="#f5b45a"/>
      <stop offset="100%" stop-color="#2a3550"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3d6"/>
      <stop offset="100%" stop-color="#f5b45a" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="heroClip">
      <path d="M 460 0 L 595 0 L 595 300 L 400 300 Z"/>
    </clipPath>
  </defs>

  <rect width="595" height="842" fill="#0a1428"/>

  <!-- padrão de pontos, canto superior esquerdo -->
  <g fill="#2a5a9a" opacity="0.6">
    <g id="dotrow">
      <circle cx="0" cy="0" r="1.6"/><circle cx="12" cy="0" r="1.6"/><circle cx="24" cy="0" r="1.6"/><circle cx="36" cy="0" r="1.6"/><circle cx="48" cy="0" r="1.6"/><circle cx="60" cy="0" r="1.6"/><circle cx="72" cy="0" r="1.6"/><circle cx="84" cy="0" r="1.6"/>
    </g>
    <use href="#dotrow" x="0" y="12"/>
    <use href="#dotrow" x="0" y="24"/>
    <use href="#dotrow" x="0" y="36"/>
    <use href="#dotrow" x="0" y="48"/>
    <use href="#dotrow" x="0" y="60"/>
    <use href="#dotrow" x="0" y="72"/>
    <use href="#dotrow" x="0" y="84"/>
  </g>
  <g fill="#2a5a9a" opacity="0.6" transform="translate(10,10)">
    <use href="#dotrow" x="0" y="0"/>
  </g>

  <!-- padrão de pontos discreto, canto inferior direito (equilíbrio visual, sem foto) -->
  <g fill="#2a5a9a" opacity="0.35" transform="translate(500,560)">
    <use href="#dotrow" x="0" y="0"/>
    <use href="#dotrow" x="0" y="12"/>
    <use href="#dotrow" x="0" y="24"/>
    <use href="#dotrow" x="0" y="36"/>
  </g>

  <!-- círculo decorativo suave (acompanha a marca, sem parecer foto) -->
  <circle cx="480" cy="520" r="180" fill="none" stroke="#f5821f" opacity="0.07" stroke-width="2"/>

  <!-- ILUSTRAÇÃO: pôr do sol com painéis, cunha simples à direita -->
  <g clip-path="url(#heroClip)">
    <rect x="400" y="0" width="195" height="300" fill="url(#skyGrad)"/>
    <circle cx="520" cy="150" r="60" fill="url(#sunGlow)"/>
    <circle cx="520" cy="150" r="24" fill="#ffe4a3"/>
    <g fill="#f6c98a" opacity="0.55">
      <ellipse cx="450" cy="90" rx="30" ry="7"/>
      <ellipse cx="500" cy="75" rx="38" ry="8"/>
      <ellipse cx="560" cy="105" rx="28" ry="6"/>
    </g>
    <rect x="400" y="230" width="195" height="70" fill="#16233f"/>
    <g stroke="#3a5a8a" stroke-width="1" opacity="0.9">
      <line x1="400" y1="235" x2="470" y2="300"/>
      <line x1="420" y1="230" x2="510" y2="300"/>
      <line x1="450" y1="230" x2="550" y2="300"/>
      <line x1="480" y1="230" x2="590" y2="300"/>
      <line x1="520" y1="230" x2="595" y2="270"/>
    </g>
  </g>
  <!-- borda diagonal simples da cunha -->
  <line x1="460" y1="0" x2="400" y2="300" stroke="#f5821f" stroke-width="4"/>

  <!-- TOP TAGLINE -->
  <line x1="330" y1="45" x2="330" y2="72" stroke="#f5821f" stroke-width="3"/>
  <text x="342" y="53" font-family="Arial, sans-serif" font-size="10.5" font-weight="700" fill="#ffffff" letter-spacing="0.5">ENGENHARIA QUE GERA</text>
  <text x="342" y="67" font-family="Arial, sans-serif" font-size="10.5" font-weight="700" letter-spacing="0.5">
    <tspan fill="#ffffff">ENERGIA QUE </tspan><tspan fill="#f5821f">TRANSFORMA.</tspan>
  </text>

  <!-- LOGO: única imagem externa real -->
  <image href="images/logo-enner.png" x="38" y="78" width="190" height="58" preserveAspectRatio="xMidYMid meet"/>

  <!-- HEADLINE (garantido livre da imagem: título termina em x~350, imagem começa em x=400) -->
  <text x="38" y="240" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" fill="#ffffff">PROPOSTA</text>
  <text x="38" y="298" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" fill="#f5821f">COMERCIAL</text>
  <line x1="40" y1="322" x2="130" y2="322" stroke="#f5821f" stroke-width="3"/>

  <text x="38" y="352" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">SISTEMA DE GERAÇÃO DE</text>
  <text x="38" y="370" font-family="Arial, sans-serif" font-size="13" font-weight="700">
    <tspan fill="#f5821f">ENERGIA SOLAR </tspan><tspan fill="#ffffff">FOTOVOLTAICA</tspan>
  </text>

  <!-- INFO ROWS (dinâmicas) -->
  <g font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">
    <g>
      <rect x="38" y="415" width="240" height="38" rx="10" fill="#101f3c"/>
      <circle cx="60" cy="434" r="14" fill="#f5821f"/>
      <path d="M 60 428 a4 4 0 1 0 0.01 0 M 53 442 q7 -9 14 0" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
      <text x="82" y="430" fill="#f5821f" font-size="9">CLIENTE</text>
      <text x="82" y="446" id="out-cliente">—</text>
    </g>
    <g>
      <rect x="38" y="463" width="240" height="38" rx="10" fill="#101f3c"/>
      <circle cx="60" cy="482" r="14" fill="#f5821f"/>
      <path d="M 60 476 a4 4 0 1 0 0.01 0 M 53 490 q7 -9 14 0 M 55 473 h10" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
      <text x="82" y="478" fill="#f5821f" font-size="9">REPRESENTANTE</text>
      <text x="82" y="494" id="out-representante">—</text>
    </g>
    <g>
      <rect x="38" y="511" width="240" height="38" rx="10" fill="#101f3c"/>
      <circle cx="60" cy="530" r="14" fill="#f5821f"/>
      <path d="M 60 523 a6 6 0 1 1 -0.01 0 z M 60 523 v11 M 56 530 h8" fill="none" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
      <text x="82" y="526" fill="#f5821f" font-size="9">CIDADE</text>
      <text x="82" y="542" id="out-cidade">—</text>
    </g>
    <g>
      <rect x="38" y="559" width="240" height="38" rx="10" fill="#101f3c"/>
      <circle cx="60" cy="578" r="14" fill="#f5821f"/>
      <rect x="53" y="571" width="14" height="12" rx="1.5" fill="none" stroke="#ffffff" stroke-width="1.6"/>
      <line x1="53" y1="575" x2="67" y2="575" stroke="#ffffff" stroke-width="1.6"/>
      <text x="82" y="574" fill="#f5821f" font-size="9">DATA</text>
      <text x="82" y="590" id="out-data">—</text>
    </g>
    <g>
      <rect x="38" y="607" width="240" height="38" rx="10" fill="#101f3c"/>
      <circle cx="60" cy="626" r="14" fill="#f5821f"/>
      <circle cx="60" cy="626" r="7" fill="none" stroke="#ffffff" stroke-width="1.6"/>
      <line x1="60" y1="626" x2="60" y2="621" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
      <line x1="60" y1="626" x2="64" y2="628" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
      <text x="82" y="622" fill="#f5821f" font-size="9">VALIDADE DA PROPOSTA</text>
      <text x="82" y="638" id="out-validade">—</text>
    </g>
  </g>

  <!-- BOTTOM FEATURE CARDS -->
  <g font-family="Arial, sans-serif">
    <rect x="30" y="690" width="535" height="105" rx="14" fill="#f7f7f5"/>
    <line x1="165" y1="705" x2="165" y2="780" stroke="#d8d6cf" stroke-width="1"/>
    <line x1="298" y1="705" x2="298" y2="780" stroke="#d8d6cf" stroke-width="1"/>
    <line x1="431" y1="705" x2="431" y2="780" stroke="#d8d6cf" stroke-width="1"/>

    <circle cx="97" cy="722" r="16" fill="none" stroke="#f5821f" stroke-width="2"/>
    <text x="97" y="728" font-size="15" fill="#f5821f" font-weight="700" text-anchor="middle">$</text>
    <text x="97" y="752" font-size="11.5" font-weight="700" fill="#14213a" text-anchor="middle">ECONOMIA</text>
    <text x="97" y="765" font-size="11.5" font-weight="700" text-anchor="middle"><tspan fill="#14213a">DE ATÉ </tspan><tspan fill="#f5821f">95%</tspan></text>
    <text x="97" y="778" font-size="9" fill="#6b7280" text-anchor="middle">NA SUA CONTA</text>
    <text x="97" y="789" font-size="9" fill="#6b7280" text-anchor="middle">DE ENERGIA</text>

    <path d="M231 708 l12 4 -12 4 -12 -4 z M219 716 v6 l12 4 12 -4 v-6" fill="none" stroke="#f5821f" stroke-width="1.8" stroke-linejoin="round"/>
    <text x="231" y="752" font-size="11.5" font-weight="700" fill="#14213a" text-anchor="middle">INVESTIMENTO</text>
    <text x="231" y="765" font-size="11.5" font-weight="700" fill="#f5821f" text-anchor="middle">SEGURO</text>
    <text x="231" y="778" font-size="9" fill="#6b7280" text-anchor="middle">E DE BAIXO RISCO</text>

    <polyline points="352,726 360,716 368,720 378,706" fill="none" stroke="#f5821f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="370,706 378,706 378,714" fill="none" stroke="#f5821f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="365" y="752" font-size="11.5" font-weight="700" fill="#14213a" text-anchor="middle">RETORNO</text>
    <text x="365" y="765" font-size="11.5" font-weight="700" fill="#f5821f" text-anchor="middle">GARANTIDO</text>
    <text x="365" y="778" font-size="9" fill="#6b7280" text-anchor="middle">E VALORIZAÇÃO</text>
    <text x="365" y="789" font-size="9" fill="#6b7280" text-anchor="middle">DO SEU IMÓVEL</text>

    <path d="M498 706 q14 4 14 18 q-14 -2 -14 -18 z" fill="none" stroke="#f5821f" stroke-width="1.8"/>
    <line x1="498" y1="706" x2="498" y2="726" stroke="#f5821f" stroke-width="1.8"/>
    <text x="498" y="752" font-size="11.5" font-weight="700" fill="#14213a" text-anchor="middle">ENERGIA LIMPA</text>
    <text x="498" y="765" font-size="11.5" font-weight="700" fill="#f5821f" text-anchor="middle">E SUSTENTÁVEL</text>
    <text x="498" y="778" font-size="9" fill="#6b7280" text-anchor="middle">PARA UM FUTURO</text>
    <text x="498" y="789" font-size="9" fill="#6b7280" text-anchor="middle">MELHOR</text>
  </g>

  <!-- FOOTER BAR: contatos (dinâmicos) -->
  <rect x="20" y="805" width="555" height="30" rx="15" fill="#0a1428"/>

  <!-- email -->
  <circle cx="45" cy="820" r="10" fill="#f5821f"/>
  <rect x="39" y="815" width="12" height="9" rx="1.2" fill="none" stroke="#0a1428" stroke-width="1.4"/>
  <path d="M39 816 l6 5 6 -5" fill="none" stroke="#0a1428" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="66" y="824" font-family="Arial, sans-serif" font-size="10" fill="#dfe6f2" id="out-email">suporte.enner@gmail.com</text>

  <!-- telefone -->
  <circle cx="255" cy="820" r="10" fill="#f5821f"/>
  <path d="M249 814 c1 -1 3 -1 4 0 l1 3 c0 1 0 2 -1 2 c1 2 2 3 4 4 c0 -1 1 -1 2 -1 l3 1 c1 1 1 3 0 4 c-1 1 -3 1 -5 0 c-4 -2 -7 -5 -9 -9 c-1 -2 -1 -4 1 -4 z" fill="#0a1428"/>
  <text x="276" y="824" font-family="Arial, sans-serif" font-size="10" fill="#dfe6f2" id="out-telefone">(71) 9 9923-9315</text>

  <!-- instagram (ícone corrigido, visível) -->
  <circle cx="455" cy="820" r="10" fill="#f5821f"/>
  <rect x="449" y="814" width="12" height="12" rx="3.5" fill="none" stroke="#0a1428" stroke-width="1.6"/>
  <circle cx="455" cy="820" r="3.2" fill="none" stroke="#0a1428" stroke-width="1.6"/>
  <circle cx="458.3" cy="816.7" r="1" fill="#0a1428"/>
  <text x="472" y="824" font-family="Arial, sans-serif" font-size="10" fill="#dfe6f2" id="out-instagram">@enner.engenharia</text>
</svg>
</section>

<!-- ===================== FORMULÁRIO DE DADOS (não impresso) ===================== -->
<section class="page form-panel no-print" id="formulario">
  <h2>Dados da Proposta</h2>

  <div class="preset-bar">
    <button id="btn-carregar-json" type="button">⇩ Carregar dados padrão (JSON)</button>
    <button id="btn-limpar" type="button" class="secondary">Limpar campos</button>
  </div>

  <fieldset>
    <legend>Empresa</legend>
    <label>E-mail
      <input type="email" id="in-email" placeholder="suporte.enner@gmail.com">
    </label>
    <label>Telefone
      <input type="text" id="in-telefone" placeholder="(71) 9 9923-9315">
    </label>
    <label>Instagram
      <input type="text" id="in-instagram" placeholder="@enner.engenharia">
    </label>
  </fieldset>

  <fieldset>
    <legend>Cliente</legend>
    <label>Nome do cliente
      <input type="text" id="in-cliente" placeholder="Ex: Francisco">
    </label>
  </fieldset>

  <fieldset>
    <legend>Representante</legend>
    <label>Nome do representante
      <input type="text" id="in-representante" placeholder="Ex: Eng. Hiago Macedo">
    </label>
  </fieldset>

  <fieldset>
    <legend>Local</legend>
    <label>Cidade / UF
      <input type="text" id="in-cidade" placeholder="Ex: Santa Maria da Vitória – BA">
    </label>
  </fieldset>

  <fieldset>
    <legend>Datas</legend>
    <label>Data da proposta
      <input type="date" id="in-data">
    </label>
    <label>Validade (dias)
      <input type="number" id="in-validade-dias" value="5" min="1">
    </label>
  </fieldset>

  <button id="btn-gerar">Gerar capa</button>
</section>

<script src="script.js"></script>
</body>
</html>
